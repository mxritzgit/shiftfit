name: security

# Statisch + Dependency-Scans. Laeuft bei jedem Push auf main, bei jedem PR
# gegen main und einmal pro Woche (Montag 06:00 UTC) damit neu publizierte
# CVEs nicht unentdeckt liegen bleiben.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

# Minimal-Default: nur Lesen. Jobs, die mehr brauchen (SARIF-Upload), heben
# das Recht job-lokal an (Least-Privilege, Audit 2026-06-09, I1).
permissions:
  contents: read

jobs:
  flutter-analyze-test:
    name: Flutter analyze + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: subosito/flutter-action@f2c4f6686ca8e8d6e6d0f28410eeef506ed66aff # v2.18.0
        with:
          channel: stable
          flutter-version: 3.44.0
          cache: true

      - name: pub get
        run: flutter pub get

      # --fatal-infos/--fatal-warnings: Info-/Warning-Lints failen den Build,
      # damit die heute saubere Analyse nicht still erodiert (Audit 2026-06-09, L4).
      - name: analyze
        run: flutter analyze --fatal-infos --fatal-warnings

      # Defines sind im CI Dummies — wir wollen nur dass Code kompiliert
      # und Widget-Tests laufen, nicht gegen Supabase netzwerken.
      # --coverage erzeugt coverage/lcov.info fuer den Floor-Check unten.
      - name: test
        run: |
          flutter test --coverage \
            --dart-define=SUPABASE_URL=https://ci.invalid \
            --dart-define=SUPABASE_ANON_KEY=ci-dummy-key

      # Coverage-Floor als Ratschet, nicht als Blocker.
      #
      # Profil der App: ~22k LOC sind UI (lib/src/widgets + screens), die nur
      # punktuell von Widget-Tests beruehrt werden; die ~4,5k LOC Logik/Sync
      # (models + services) sind dagegen dicht unit-getestet. Daraus ergibt sich
      # eine realistische Gesamt-Line-Coverage im Bereich ~30-40 %.
      #
      # Der Floor steht bewusst ein paar Punkte UNTER dieser Schaetzung (30 %),
      # damit er die jetzt aufgebaute Logik-/Sync-Coverage gegen stilles Erodieren
      # absichert, ohne den Build bei harmlosen UI-Aenderungen faelschlich rot zu
      # machen. Steigt die Coverage nachhaltig, kann der Floor spaeter angehoben
      # werden (Ratschet-Prinzip).
      - name: Coverage floor check
        env:
          COVERAGE_FLOOR: '30'
        run: |
          set -euo pipefail
          LCOV=coverage/lcov.info
          if [ ! -f "$LCOV" ]; then
            echo "::error::coverage/lcov.info nicht gefunden — lief 'flutter test --coverage'?"
            exit 1
          fi
          # LCOV: LF = lines found (instrumentiert), LH = lines hit (getroffen).
          # Total-Line-Coverage = sum(LH) / sum(LF) * 100.
          PCT="$(awk -F: '
            /^LF:/ { found += $2 }
            /^LH:/ { hit   += $2 }
            END {
              if (found == 0) { print "0.0"; exit }
              printf "%.1f", (hit / found) * 100
            }
          ' "$LCOV")"
          echo "Total line coverage: ${PCT}% (floor: ${COVERAGE_FLOOR}%)"
          # Float-Vergleich portabel via awk (bash kann nur Integer).
          if awk -v p="$PCT" -v f="$COVERAGE_FLOOR" 'BEGIN { exit !(p < f) }'; then
            echo "::error::Line-Coverage ${PCT}% liegt unter dem Floor von ${COVERAGE_FLOOR}%. Bitte Logik-/Sync-Tests ergaenzen (Floor ist ein Ratschet, kein Stylegate)."
            exit 1
          fi
          echo "::notice::Coverage-Floor erfuellt: ${PCT}% >= ${COVERAGE_FLOOR}%."

  pub-outdated:
    name: Flutter pub outdated (Info)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: subosito/flutter-action@f2c4f6686ca8e8d6e6d0f28410eeef506ed66aff # v2.18.0
        with:
          channel: stable
          flutter-version: 3.44.0
          cache: true
      - run: flutter pub get
      # Info-only — failt den Job nicht. So sehen wir veraltete Deps im
      # Action-Log ohne dass jeder Patch-Release den Build rot macht.
      # (--mode=null-safety wurde mit Dart 3 entfernt und liess den Befehl
      # frueher still mit Exit 65 abbrechen — Audit 2026-06-09, L1.)
      - name: pub outdated
        run: flutter pub outdated || true

  secret-scan:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Volle History scannen, nicht nur den HEAD-Commit, damit ein
          # versehentlich (auch in einem aelteren Commit) committetes Secret
          # auffaellt. Public Repo -> gitleaks ist kostenlos, kein Lizenz-Key.
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  osv-scanner:
    name: OSV-Scanner (Pub + Deno)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      # Scannt pubspec.lock (Pub-Ecosystem) und deno.lock falls vorhanden.
      # SARIF-Upload landet im Security-Tab des Repos. KEIN continue-on-error
      # mehr am Scanner-Step: ein bekannter CVE in den Deps failt den Build
      # jetzt sichtbar, statt im Log eines gruenen Jobs zu verschwinden
      # (Audit 2026-06-09, M4).
      - uses: google/osv-scanner-action/osv-scanner-action@daa2c68f50d845057895a9c300e42478481c1d26 # v1.9.1
        with:
          scan-args: |-
            --recursive
            --skip-git
            --format=sarif
            --output=osv-results.sarif
            ./
      # SARIF-Upload braucht Code-Scanning auf Repo-Ebene aktiviert
      # (in den GitHub-Security-Settings). Solange das nicht aktiv ist,
      # failt der Upload mit "Resource not accessible by integration".
      # Tolerant halten — die Scan-Resultate stehen weiter im Job-Log, und
      # der Scanner-Step oben faellt bereits bei echten Findings.
      - name: Upload SARIF
        if: always() && hashFiles('osv-results.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: osv-results.sarif

  deno-edge-functions:
    name: Deno lint + check (Edge Functions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: denoland/setup-deno@909cc5acb0fdd60627fb858598759246509fa755 # v2.0.2
        with:
          # Deno 1.x ist EOL; die Edge-Runtime ist auf Deno 2. Die Functions
          # sind dependency-frei, der Umstieg ist risikoarm (Audit 2026-06-09, L7).
          deno-version: v2.x
      - name: deno lint
        working-directory: supabase/functions
        run: deno lint
      # `deno check` macht statische TypeScript-Pruefung gegen die Imports
      # ohne die Function tatsaechlich zu deployen.
      - name: deno check
        working-directory: supabase/functions
        run: |
          for fn in */index.ts; do
            echo "::group::deno check $fn"
            deno check "$fn" || exit 1
            echo "::endgroup::"
          done

  supabase-migration-drift:
    name: Supabase migration drift (Management API)
    runs-on: ubuntu-latest
    # Faellt nur, wenn eine Repo-Migration NICHT in der Live-Migrationshistorie
    # (supabase_migrations.schema_migrations) registriert ist. Gegated hinter
    # Secrets: ohne SUPABASE_ACCESS_TOKEN + SUPABASE_PROJECT_REF wird der Check
    # sauber uebersprungen, damit Forks/PRs ohne Secret-Zugriff den Build nicht
    # rot machen. Nutzt die Management-API (kein DB-Passwort/CLI-Login noetig).
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Verfuegbarkeit der Secrets EINMAL als Output festhalten. Secrets duerfen
      # nicht direkt in `if:`-Job-Conditions stehen, daher der Umweg ueber einen
      # Step-Output.
      - name: Check Supabase secrets
        id: secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -n "$SUPABASE_ACCESS_TOKEN" ] && [ -n "$SUPABASE_PROJECT_REF" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SUPABASE_ACCESS_TOKEN/SUPABASE_PROJECT_REF nicht gesetzt — Migration-Drift-Check uebersprungen."
          fi

      # Fragt die registrierte Migrationshistorie der Live-DB ueber die
      # Management-API ab und vergleicht sie gegen die Dateinamen in
      # supabase/migrations/. Eine Repo-Version, die nicht registriert ist ->
      # Drift -> Job failt. Kein `supabase db push --dry-run` mehr: das brauchte
      # ein zusaetzliches SUPABASE_DB_PASSWORD-Secret + DB-Login.
      - name: Migration drift check (Management API)
        if: steps.secrets.outputs.available == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          QUERY="select coalesce(string_agg(version, ',' order by version), '') as v from supabase_migrations.schema_migrations"
          BODY="$(jq -n --arg q "$QUERY" '{query:$q}')"
          # Browser-User-Agent: Supabase haengt vor der Management-API eine
          # Cloudflare-Regel, die Default-curl-UAs mit Fehler 1010 blockt.
          RESP="$(curl -sS -X POST \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            --data-binary "$BODY")"
          REGISTERED="$(echo "$RESP" | jq -r '.[0].v // empty')"
          if [ -z "$REGISTERED" ]; then
            echo "::error::Konnte die Migrationshistorie nicht lesen (leere/fehlerhafte Antwort der Management-API): $RESP"
            exit 1
          fi
          echo "::group::Registrierte Versionen (Live-DB)"
          echo "$REGISTERED" | tr ',' '\n'
          echo "::endgroup::"
          MISSING=""
          for f in supabase/migrations/*.sql; do
            v="$(basename "$f" | cut -d_ -f1)"
            case ",$REGISTERED," in
              *",$v,"*) ;;
              *) MISSING="$MISSING $v" ;;
            esac
          done
          if [ -n "$MISSING" ]; then
            echo "::error::Nicht in supabase_migrations.schema_migrations registrierte Repo-Migration(en):$MISSING — Live-DB weicht vom Repo ab. Migration anwenden + Historie nachziehen. Siehe supabase/SCHEMA_STATE_2026-06-07.md."
            exit 1
          fi
          echo "Keine Migration-Drift — alle $(ls supabase/migrations/*.sql | wc -l) Repo-Migrationen sind auf der Live-DB registriert."
