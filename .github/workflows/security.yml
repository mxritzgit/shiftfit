name: security

# Statisch + Dependency-Scans. Laeuft bei jedem Push auf main, bei jedem PR
# gegen main und einmal pro Woche (Montag 06:00 UTC) damit neu publizierte
# CVEs nicht unentdeckt liegen bleiben.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  flutter-analyze-test:
    name: Flutter analyze + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: pub get
        run: flutter pub get

      - name: analyze
        run: flutter analyze

      # Defines sind im CI Dummies — wir wollen nur dass Code kompiliert
      # und Widget-Tests laufen, nicht gegen Supabase netzwerken.
      # --coverage erzeugt coverage/lcov.info fuer den Floor-Check unten.
      - name: test
        run: |
          flutter test --coverage \
            --dart-define=SUPABASE_URL=https://ci.invalid \
            --dart-define=SUPABASE_ANON_KEY=ci-dummy-key

      # Coverage-Floor als Ratschet, nicht als Blocker.
      #
      # Profil der App: ~22k LOC sind UI (lib/src/widgets + screens), die nur
      # punktuell von Widget-Tests beruehrt werden; die ~4,5k LOC Logik/Sync
      # (models + services) sind dagegen dicht unit-getestet. Daraus ergibt sich
      # eine realistische Gesamt-Line-Coverage im Bereich ~30-40 %.
      #
      # Der Floor steht bewusst ein paar Punkte UNTER dieser Schaetzung (30 %),
      # damit er die jetzt aufgebaute Logik-/Sync-Coverage gegen stilles Erodieren
      # absichert, ohne den Build bei harmlosen UI-Aenderungen faelschlich rot zu
      # machen. Steigt die Coverage nachhaltig, kann der Floor spaeter angehoben
      # werden (Ratschet-Prinzip).
      - name: Coverage floor check
        env:
          COVERAGE_FLOOR: '30'
        run: |
          set -euo pipefail
          LCOV=coverage/lcov.info
          if [ ! -f "$LCOV" ]; then
            echo "::error::coverage/lcov.info nicht gefunden — lief 'flutter test --coverage'?"
            exit 1
          fi
          # LCOV: LF = lines found (instrumentiert), LH = lines hit (getroffen).
          # Total-Line-Coverage = sum(LH) / sum(LF) * 100.
          PCT="$(awk -F: '
            /^LF:/ { found += $2 }
            /^LH:/ { hit   += $2 }
            END {
              if (found == 0) { print "0.0"; exit }
              printf "%.1f", (hit / found) * 100
            }
          ' "$LCOV")"
          echo "Total line coverage: ${PCT}% (floor: ${COVERAGE_FLOOR}%)"
          # Float-Vergleich portabel via awk (bash kann nur Integer).
          if awk -v p="$PCT" -v f="$COVERAGE_FLOOR" 'BEGIN { exit !(p < f) }'; then
            echo "::error::Line-Coverage ${PCT}% liegt unter dem Floor von ${COVERAGE_FLOOR}%. Bitte Logik-/Sync-Tests ergaenzen (Floor ist ein Ratschet, kein Stylegate)."
            exit 1
          fi
          echo "::notice::Coverage-Floor erfuellt: ${PCT}% >= ${COVERAGE_FLOOR}%."

  pub-outdated:
    name: Flutter pub outdated (Info)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      # Info-only — failt den Job nicht. So sehen wir veraltete Deps im
      # Action-Log ohne dass jeder Patch-Release den Build rot macht.
      - name: pub outdated
        run: flutter pub outdated --mode=null-safety || true

  osv-scanner:
    name: OSV-Scanner (Pub + Deno)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Scannt pubspec.lock (Pub-Ecosystem) und deno.lock falls vorhanden.
      # SARIF-Upload landet im Security-Tab des Repos.
      - uses: google/osv-scanner-action/osv-scanner-action@v1.9.1
        with:
          scan-args: |-
            --recursive
            --skip-git
            --format=sarif
            --output=osv-results.sarif
            ./
        continue-on-error: true
      # SARIF-Upload braucht Code-Scanning auf Repo-Ebene aktiviert
      # (in den GitHub-Security-Settings). Solange das nicht aktiv ist,
      # failt der Upload mit "Resource not accessible by integration".
      # Tolerant halten — die Scan-Resultate stehen weiter im Job-Log.
      - name: Upload SARIF
        if: always() && hashFiles('osv-results.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: osv-results.sarif

  deno-edge-functions:
    name: Deno lint + check (Edge Functions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x
      - name: deno lint
        working-directory: supabase/functions
        run: deno lint
      # `deno check` macht statische TypeScript-Pruefung gegen die Imports
      # ohne die Function tatsaechlich zu deployen.
      - name: deno check
        working-directory: supabase/functions
        run: |
          for fn in */index.ts; do
            echo "::group::deno check $fn"
            deno check "$fn" || exit 1
            echo "::endgroup::"
          done

  supabase-migration-drift:
    name: Supabase migration drift (Linked DB)
    runs-on: ubuntu-latest
    # Faellt nur, wenn die Live-DB von den Repo-Migrationen abweicht (pending
    # Migration nicht gepusht). Gegated hinter Secrets: ohne SUPABASE_ACCESS_TOKEN
    # + SUPABASE_PROJECT_REF wird der Drift-Schritt sauber uebersprungen, damit
    # Forks/PRs ohne Secret-Zugriff den Build nicht rot machen.
    steps:
      - uses: actions/checkout@v4

      # Verfuegbarkeit der Secrets EINMAL als Output festhalten. Secrets duerfen
      # nicht direkt in `if:`-Job-Conditions stehen, daher der Umweg ueber einen
      # Step-Output.
      - name: Check Supabase secrets
        id: secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -n "$SUPABASE_ACCESS_TOKEN" ] && [ -n "$SUPABASE_PROJECT_REF" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SUPABASE_ACCESS_TOKEN/SUPABASE_PROJECT_REF nicht gesetzt — Migration-Drift-Check uebersprungen."
          fi

      - name: Install Supabase CLI
        if: steps.secrets.outputs.available == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        if: steps.secrets.outputs.available == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      # `db push --dry-run` listet Migrationen, die lokal vorhanden, aber auf der
      # Live-DB NOCH NICHT angewendet sind. Wenn die Ausgabe solche Eintraege
      # enthaelt -> Drift -> Job failt. So kann keine PENDING-Migration unbemerkt
      # in main landen, ohne dass sie auch deployt wurde.
      - name: Migration drift check (db push --dry-run)
        if: steps.secrets.outputs.available == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          echo "::group::supabase db push --dry-run"
          OUT="$(supabase db push --dry-run 2>&1)"
          echo "$OUT"
          echo "::endgroup::"
          if echo "$OUT" | grep -qiE 'Would push|Applying migration|pending'; then
            echo "::error::Pending Supabase-Migration(en) erkannt — Live-DB weicht vom Repo ab. Bitte 'supabase db push' ausfuehren. Siehe supabase/SCHEMA_STATE_2026-06-04.md."
            exit 1
          fi
          echo "Keine Migration-Drift erkannt — Live-DB == Repo."
