# gitleaks-Konfiguration für den security.yml-Secret-Scan (Audit 2026-06-09, M2).
# Erweitert die Default-Regeln und allowlisted GENAU den einen credential-
# förmigen String, der by design im öffentlichen Repo/Client-Bundle liegt:
# den Supabase-ANON-JWT (iss=supabase, ref=ftoozzvmduptrvrrrshb, role=anon).
# Der ist RLS-geschützt und kein Secret. Ein service_role-Key (role:service_role)
# oder ein OpenRouter-/sb_secret_-Key würde NICHT matchen und bleibt ein Treffer.

title = "FitPilot gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Supabase Anon-JWT ist by-design öffentlich (role:anon, RLS-geschützt)."
regexTarget = "match"
regexes = [
  # JWT-Header (HS256) + Payload-Prefix mit iss=supabase, ref=ftoozz…, role=anon.
  # iat/exp/Signatur variabel -> der Rest bleibt offen gematcht.
  '''eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0b296enZtZHVwdHJ2cnJyc2hiIiwicm9sZSI6ImFub24i[A-Za-z0-9_.\-]+''',
]
